name: pipeline
on:
    push:
        branches:
        - main
jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
        - name: print job1
          run: echo "job1"
    job2:
        runs-on: ubuntu-latest
        needs: job1
        steps:
        - name: print job2
          run: echo "job2"
    job3:
        runs-on: ubuntu-latest
        needs: job1
        steps:
        - name: print job4
          run: echo "job3"
    job4:
        runs-on: ubuntu-latest
        needs: job2
        steps:
        - name: print job4
          run: echo "job4"
    job5:
        runs-on: ubuntu-latest
        needs: job3
        steps:
        - name: print job5
          run: echo "job5"
    job6:
        runs-on: ubuntu-latest
        needs: [job4,job5]
        steps:
        - name: print job6
          run: echo "job6"
