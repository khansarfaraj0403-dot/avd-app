name: workflow demo2
on:
  push:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v2
    
    - name: install required dependencies
      run: pip install -r requirments.txt
    
    - name: run test case
      run: pytest --cov=cal --cov-report=term --cov-fail-under=70
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: print message
      run: echo 'deployment successfull'
